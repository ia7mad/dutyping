name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project DutyPing.xcodeproj \
            -scheme DutyPing \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/DutyPing.app Payload/
          zip -qry DutyPing.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: DutyPing-ipa
          path: DutyPing.ipa
          if-no-files-found: error
