name: Build unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # XcodeGen emits the Xcode 16 project format, so the runner's default
      # Xcode is not necessarily new enough to open it.
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project DutyPing.xcodeproj \
            -scheme DutyPing \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/DutyPing.app Payload/
          zip -qry DutyPing.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: DutyPing-ipa
          path: DutyPing.ipa
          if-no-files-found: error
