name: DutyPing
options:
  bundleIdPrefix: com.dutyping
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  # Current XcodeGen defaults to the Xcode 16 project format, which the
  # runner's Xcode cannot open. 56 is readable by Xcode 14 and up.
  objectVersion: 56

targets:
  DutyPing:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dutyping.app
        PRODUCT_NAME: DutyPing
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        # Sideloading tools (SideStore / AltStore) re-sign the app themselves,
        # so CI ships it unsigned.
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_ENTITLEMENTS: ""
